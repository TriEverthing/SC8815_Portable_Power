<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Global base style */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Lock global unified font, avoid system default fallback */
    font-family: Arial, sans-serif;
}
/* Page full screen centering */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f5f5f5;
}
/* Outer card container */
.network-card {
    width: 90%;
    max-width: 420px;
    padding: 2.5rem;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    /* Core rule: make all inner content center-aligned by default */
    text-align: center;
}
/* Header title style */
.network-card h1 {
    font-size: 1.8rem;
    margin-bottom: 2rem;
}
/* Form item container, used to unify the control of labels and input boxes */
.form-item {
    margin-bottom: 1.5rem;
    /* Make the form item itself also center-aligned */
    text-align: center;
}
/* Label text style */
.form-item label {
    display: block;
    font-size: 1.1rem;
    margin-bottom: 0.6rem;
    /* Force the label text to be center-aligned */
    text-align: center;
}
/* Input field style */
.form-item input {
    width: 90%;
    padding: 0.9rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
}
/* Connect button style, explicit font settings to avoid unexpected changes */
.connect-btn {
    width: 90%;
    padding: 1rem;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.2rem;
    /* Explicitly lock font to match global style */
    font-family: inherit;
    font-weight: normal;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="network-card">
    <h1>Connect to Your Network</h1>
    <form action="/connect" method="POST">
    <div class="form-item">
        <label>SSID</label>
        <input type="text" name="ssid" required>
    </div>
    <div class="form-item">
        <label>Password</label>
        <input type="password" name="pass">
    </div>
    <button type="submit" class="connect-btn">Connect</button>
    </form>
</div>
</body>
</html>
